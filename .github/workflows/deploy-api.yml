name: Deploy API (Fly.io)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/shared/**"
      - "packages/robot-protocol/**"
      - "fly.api.toml"
      - ".github/workflows/deploy-api.yml"

concurrency:
  group: deploy-api
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      # TODO(migrations): `flyctl deploy` does NOT run Prisma migrations. Either
      # (a) uncomment the `release_command` in fly.api.toml once the runtime
      # image has Prisma CLI available, or (b) run a one-off here:
      #   flyctl ssh console -C "node_modules/.bin/prisma migrate deploy" \
      #     --config fly.api.toml --app robot-api
      - name: Deploy
        run: flyctl deploy --config fly.api.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
