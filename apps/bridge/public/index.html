<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Robot Assistant</title>
    <style>
      :root {
        --bg: #0e1116;
        --panel: #151a22;
        --border: #242b36;
        --text: #e6e8eb;
        --muted: #8a93a0;
        --subtle: #5c6370;
        --accent: #7dd3fc;
        --ok: #34d399;
        --warn: #fbbf24;
        --err: #f87171;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { background: var(--bg); color: var(--text); font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; min-height: 100vh; }

      /* Main container */
      .container { max-width: 600px; margin: 0 auto; padding: 2rem 1.5rem; min-height: 100vh; display: flex; flex-direction: column; }

      /* Header */
      .header { text-align: center; margin-bottom: 2rem; }
      .header h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.25rem; }
      .header p { color: var(--muted); font-size: 0.9rem; }

      /* Status indicator */
      .status-bar { display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-bottom: 1.5rem; font-size: 0.85rem; }
      .status-dot { width: 8px; height: 8px; border-radius: 50%; }
      .status-dot.ok { background: var(--ok); box-shadow: 0 0 8px var(--ok); }
      .status-dot.warn { background: var(--warn); animation: pulse 1.5s infinite; }
      .status-dot.err { background: var(--err); }
      .status-dot.muted { background: var(--subtle); }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

      /* Agent grid */
      .agent-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; flex: 1; }
      .agent-card {
        background: var(--panel);
        border: 2px solid var(--border);
        border-radius: 12px;
        padding: 1.5rem 1rem;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .agent-card:hover { border-color: var(--accent); transform: translateY(-2px); }
      .agent-card.selected { border-color: var(--accent); background: rgba(125, 211, 252, 0.1); }
      .agent-card.disabled { opacity: 0.5; cursor: not-allowed; }
      .agent-avatar {
        width: 64px; height: 64px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--accent) 0%, #a78bfa 100%);
        margin: 0 auto 1rem;
        display: flex; align-items: center; justify-content: center;
        font-size: 1.5rem; font-weight: 600; color: var(--bg);
      }
      .agent-name { font-size: 1rem; font-weight: 600; margin-bottom: 0.25rem; }
      .agent-desc { font-size: 0.75rem; color: var(--muted); line-height: 1.4; }

      /* Conversation view */
      .conversation { display: none; flex-direction: column; flex: 1; }
      .conversation.active { display: flex; }
      .conv-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
      .back-btn {
        background: none; border: none; color: var(--muted); cursor: pointer;
        font-size: 1.5rem; padding: 0.5rem;
      }
      .back-btn:hover { color: var(--text); }
      .stop-btn {
        background: var(--err);
        color: white;
        border: none;
        border-radius: 8px;
        padding: 0.5rem 1rem;
        font-size: 0.85rem;
        cursor: pointer;
        transition: opacity 0.2s;
      }
      .stop-btn:hover { opacity: 0.8; }
      .stop-btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .conv-agent { flex: 1; }
      .conv-agent-name { font-size: 1.1rem; font-weight: 600; }
      .conv-agent-status { font-size: 0.8rem; color: var(--muted); }

      /* Chat bubbles */
      .chat-area { flex: 1; display: flex; flex-direction: column; gap: 1rem; overflow-y: auto; max-height: 60vh; padding: 0.5rem; }
      .chat-bubble {
        padding: 1rem 1.25rem;
        border-radius: 16px;
        max-width: 90%;
        line-height: 1.5;
      }
      .chat-bubble.user {
        background: var(--accent);
        color: var(--bg);
        align-self: flex-end;
        border-bottom-right-radius: 4px;
      }
      .chat-bubble.assistant {
        background: var(--panel);
        border: 1px solid var(--border);
        align-self: flex-start;
        border-bottom-left-radius: 4px;
      }
      .chat-placeholder {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: var(--muted);
      }

      /* Phase indicator */
      .phase-indicator {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: 1rem;
        background: var(--panel);
        border-radius: 12px;
        margin-top: 1rem;
      }
      .phase-icon { font-size: 1.5rem; }
      .phase-text { font-size: 0.9rem; color: var(--muted); }
      .phase-text.active { color: var(--accent); }

      /* Footer link */
      .footer { text-align: center; padding-top: 2rem; margin-top: auto; }
      .footer a { color: var(--subtle); font-size: 0.75rem; text-decoration: none; }
      .footer a:hover { color: var(--muted); text-decoration: underline; }

      /* Loading state */
      .loading { display: flex; align-items: center; justify-content: center; padding: 3rem; color: var(--muted); }
      .spinner { width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 0.75rem; }
      @keyframes spin { to { transform: rotate(360deg); } }

      /* Empty state */
      .empty { text-align: center; padding: 3rem; color: var(--muted); }
      .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.5; }

      .hide { display: none !important; }

      /* Settings panel */
      .settings-panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1rem;
        margin-top: 1rem;
      }
      .settings-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 0.75rem;
      }
      .settings-row:last-child { margin-bottom: 0; }
      .settings-row label {
        width: 80px;
        font-size: 0.8rem;
        color: var(--muted);
      }
      .settings-row input[type="range"] {
        flex: 1;
        height: 4px;
        -webkit-appearance: none;
        background: var(--border);
        border-radius: 2px;
      }
      .settings-row input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--accent);
        cursor: pointer;
      }
      .settings-row span {
        width: 50px;
        text-align: right;
        font-size: 0.8rem;
        color: var(--muted);
      }
      .settings-toggle {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--muted);
        padding: 0.5rem 1rem;
        font-size: 0.8rem;
        cursor: pointer;
        margin-top: 0.75rem;
        width: 100%;
      }
      .settings-toggle:hover { color: var(--text); border-color: var(--accent); }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Agent Selection View -->
      <div id="view-select">
        <div class="header">
          <h1>Robot Assistant</h1>
          <p>Escolha um assistente para conversar</p>
        </div>

        <div class="status-bar" id="statusBar">
          <span class="status-dot muted"></span>
          <span>Verificando conexao...</span>
        </div>

        <div id="agentList" class="agent-grid">
          <div class="loading"><div class="spinner"></div>Carregando...</div>
        </div>

        <div class="footer">
          <a href="/admin">Configuracoes</a>
        </div>
      </div>

      <!-- Conversation View -->
      <div id="view-chat" class="conversation">
        <div class="conv-header">
          <button class="back-btn" onclick="goBack()" title="Voltar">&#8592;</button>
          <div class="conv-agent">
            <div class="conv-agent-name" id="chatAgentName">—</div>
            <div class="conv-agent-status" id="chatAgentStatus">Conectando...</div>
          </div>
          <button class="stop-btn" id="btnStop" onclick="toggleConversation()" data-running="1" title="Parar/Iniciar conversa">Parar</button>
        </div>

        <div class="chat-area" id="chatArea">
          <div class="chat-placeholder" id="chatPlaceholder">
            <div>
              <div style="font-size: 3rem; margin-bottom: 1rem; opacity: 0.3;">&#127908;</div>
              <div>Comece a falar...</div>
              <div style="font-size: 0.8rem; margin-top: 0.5rem;">O microfone esta ativo</div>
            </div>
          </div>
        </div>

        <div class="phase-indicator" id="phaseIndicator">
          <span class="phase-icon" id="phaseIcon">&#128266;</span>
          <span class="phase-text" id="phaseText">Ouvindo...</span>
          <span class="phase-timeout" id="phaseTimeout" style="margin-left: auto; font-size: 0.75rem; color: var(--subtle);"></span>
        </div>

        <!-- Settings panel -->
        <div class="settings-panel" id="settingsPanel" style="display: none;">
          <div class="settings-row">
            <label>Volume Voz</label>
            <input type="range" id="sliderVolume" min="0" max="100" value="100" style="flex:1;">
            <span id="volumeValue">100%</span>
          </div>
          <div class="settings-row">
            <label>Ganho Mic</label>
            <input type="range" id="sliderMicGain" min="10" max="100" value="40" style="flex:1;">
            <span id="micGainValue">4.0x</span>
          </div>
          <div class="settings-row">
            <label>Cooldown</label>
            <input type="range" id="sliderCooldown" min="500" max="3000" step="100" value="1500" style="flex:1;">
            <span id="cooldownValue">1.5s</span>
          </div>
        </div>

        <button class="settings-toggle" id="btnSettings" onclick="toggleSettings()">&#9881; Config</button>
      </div>
    </div>

    <script>
      // State
      let agents = [];
      let currentAgentId = null;
      let isInChat = false;
      let lastStatus = null;
      // Conversation history
      let chatHistory = [];
      let lastSeenUserText = null;
      let lastSeenAssistantText = null;
      // Session timeout tracking
      let lastSeenSessionTimeout = null;

      // API helper
      async function api(path, opts = {}) {
        const res = await fetch(path, {
          method: opts.method || 'GET',
          headers: opts.body ? { 'Content-Type': 'application/json' } : {},
          body: opts.body ? JSON.stringify(opts.body) : undefined,
        });
        const text = await res.text();
        let data;
        try { data = JSON.parse(text); } catch { data = { raw: text }; }
        if (!res.ok) throw new Error(data?.error || `HTTP ${res.status}`);
        return data;
      }

      // Render agents
      function renderAgents() {
        const container = document.getElementById('agentList');
        if (agents.length === 0) {
          container.innerHTML = `
            <div class="empty" style="grid-column: 1/-1;">
              <div class="empty-icon">&#129302;</div>
              <div>Nenhum agente configurado</div>
              <div style="font-size: 0.8rem; margin-top: 0.5rem;">
                Acesse <a href="/admin" style="color: var(--accent)">configuracoes</a> para criar um
              </div>
            </div>
          `;
          return;
        }

        container.innerHTML = agents.map(agent => `
          <div class="agent-card ${agent.id === currentAgentId ? 'selected' : ''}"
               onclick="selectAgent('${agent.id}')"
               data-agent-id="${agent.id}">
            <div class="agent-avatar">${agent.name.charAt(0).toUpperCase()}</div>
            <div class="agent-name">${agent.name}</div>
            <div class="agent-desc">${(agent.personality || '').slice(0, 50)}${agent.personality?.length > 50 ? '...' : ''}</div>
          </div>
        `).join('');
      }

      // Update status bar
      function updateStatusBar(status) {
        const bar = document.getElementById('statusBar');
        const dot = bar.querySelector('.status-dot');
        const text = bar.querySelector('span:last-child');

        if (!status) {
          dot.className = 'status-dot muted';
          text.textContent = 'Verificando...';
          return;
        }

        if (status.ws?.connected && status.ble?.connected) {
          dot.className = 'status-dot ok';
          text.textContent = 'Conectado';
        } else if (status.ws?.connected) {
          dot.className = 'status-dot warn';
          text.textContent = status.autoConnect?.running ? 'Conectando robo...' : 'Robo desconectado';
        } else {
          dot.className = 'status-dot err';
          text.textContent = 'Sem conexao';
        }
      }

      // Update phase indicator
      function updatePhase(realtime) {
        const icon = document.getElementById('phaseIcon');
        const text = document.getElementById('phaseText');
        const timeout = document.getElementById('phaseTimeout');

        if (!realtime || !realtime.enabled) {
          icon.textContent = '...';
          text.textContent = 'Iniciando...';
          text.className = 'phase-text';
          timeout.textContent = '';
          return;
        }

        const phases = {
          idle: ['&#128266;', 'Pronto', false],
          connecting: ['&#8987;', 'Conectando...', false],
          listening: ['&#127908;', 'Ouvindo...', true],
          thinking: ['&#129504;', 'Pensando...', true],
          speaking: ['&#128483;', 'Falando...', true],
          error: ['&#9888;', 'Erro', false],
        };

        const [ic, tx, active] = phases[realtime.phase] || ['&#128266;', realtime.phase, false];
        icon.innerHTML = ic;
        text.textContent = tx;
        text.className = active ? 'phase-text active' : 'phase-text';

        // Show session timeout
        if (realtime.sessionTimeoutMs > 0) {
          const secs = Math.round(realtime.sessionTimeoutMs / 1000);
          timeout.textContent = `Reset: ${secs}s`;
        } else {
          timeout.textContent = '';
        }
      }

      // Update chat bubbles - keeps conversation history
      function updateChat(realtime) {
        if (!realtime) return;

        const placeholder = document.getElementById('chatPlaceholder');
        const area = document.getElementById('chatArea');

        // Detect session reset: realtime cleared lastUserText/lastAssistantText
        // while we had previous history
        if (!realtime.lastUserText && !realtime.lastAssistantText &&
            (lastSeenUserText || lastSeenAssistantText) && chatHistory.length > 0) {
          console.log('[session] detected session reset by timeout');
          clearChatHistory();
        }

        // Check for new user message
        if (realtime.lastUserText && realtime.lastUserText !== lastSeenUserText) {
          lastSeenUserText = realtime.lastUserText;
          chatHistory.push({ role: 'user', text: realtime.lastUserText });

          placeholder.classList.add('hide');
          const bubble = document.createElement('div');
          bubble.className = 'chat-bubble user';
          bubble.textContent = realtime.lastUserText;
          area.appendChild(bubble);
          area.scrollTop = area.scrollHeight;
        }

        // Check for new assistant message
        if (realtime.lastAssistantText && realtime.lastAssistantText !== lastSeenAssistantText) {
          lastSeenAssistantText = realtime.lastAssistantText;
          chatHistory.push({ role: 'assistant', text: realtime.lastAssistantText });

          placeholder.classList.add('hide');
          const bubble = document.createElement('div');
          bubble.className = 'chat-bubble assistant';
          bubble.textContent = realtime.lastAssistantText;
          area.appendChild(bubble);
          area.scrollTop = area.scrollHeight;
        }
      }

      // Clear chat history when switching agents
      function clearChatHistory() {
        chatHistory = [];
        lastSeenUserText = null;
        lastSeenAssistantText = null;
        const area = document.getElementById('chatArea');
        area.querySelectorAll('.chat-bubble').forEach(el => el.remove());
        document.getElementById('chatPlaceholder').classList.remove('hide');
      }

      // Select agent and start chat
      async function selectAgent(agentId) {
        const agent = agents.find(a => a.id === agentId);
        if (!agent) return;

        currentAgentId = agentId;

        // Switch to chat view
        document.getElementById('view-select').classList.add('hide');
        document.getElementById('view-chat').classList.remove('hide');
        document.getElementById('view-chat').classList.add('active');
        isInChat = true;

        // Update header
        document.getElementById('chatAgentName').textContent = agent.name;
        document.getElementById('chatAgentStatus').textContent = 'Conectando...';

        // Reset chat history
        clearChatHistory();

        try {
          // Set agent
          await api('/api/realtime/agent', { method: 'POST', body: { agentId } });
          // Start realtime
          await api('/api/realtime/start', { method: 'POST' });
          document.getElementById('chatAgentStatus').textContent = 'Ativo';
        } catch (e) {
          document.getElementById('chatAgentStatus').textContent = 'Erro: ' + e.message;
        }
      }

      // Toggle conversation (start/stop)
      async function toggleConversation() {
        const btn = document.getElementById('btnStop');
        const isRunning = btn.dataset.running === '1';
        btn.disabled = true;

        try {
          if (isRunning) {
            btn.textContent = 'Parando...';
            // Stop audio playback immediately
            resetPlayback();
            await api('/api/realtime/stop', { method: 'POST' });
            document.getElementById('chatAgentStatus').textContent = 'Parado';
            btn.dataset.running = '0';
            btn.textContent = 'Iniciar';
            btn.style.background = 'var(--ok)';
          } else {
            btn.textContent = 'Iniciando...';
            await api('/api/realtime/start', { method: 'POST' });
            document.getElementById('chatAgentStatus').textContent = 'Ativo';
            btn.dataset.running = '1';
            btn.textContent = 'Parar';
            btn.style.background = 'var(--err)';
          }
        } catch (e) {
          console.error('Error toggling:', e);
          document.getElementById('chatAgentStatus').textContent = 'Erro';
        } finally {
          btn.disabled = false;
        }
      }

      // Go back to agent selection
      async function goBack() {
        isInChat = false;
        document.getElementById('view-chat').classList.add('hide');
        document.getElementById('view-chat').classList.remove('active');
        document.getElementById('view-select').classList.remove('hide');

        // Stop realtime
        try {
          await api('/api/realtime/stop', { method: 'POST' });
        } catch (e) {
          console.error('Error stopping realtime:', e);
        }

        // Clear chat history
        clearChatHistory();

        renderAgents();
      }

      // Load agents
      async function loadAgents() {
        try {
          const data = await api('/api/agents');
          agents = data.agents || [];
          currentAgentId = data.currentAgentId || null;
          renderAgents();
        } catch (e) {
          console.error('Error loading agents:', e);
          document.getElementById('agentList').innerHTML = `
            <div class="empty" style="grid-column: 1/-1;">
              <div class="empty-icon">&#9888;</div>
              <div>Erro ao carregar agentes</div>
              <div style="font-size: 0.8rem; margin-top: 0.5rem;">${e.message}</div>
            </div>
          `;
        }
      }

      // Load status
      async function loadStatus() {
        try {
          const status = await api('/api/status');
          lastStatus = status;
          updateStatusBar(status);

          if (isInChat) {
            updatePhase(status.realtime);
            updateChat(status.realtime);

            // Update agent status in header
            const agentStatus = document.getElementById('chatAgentStatus');
            const stopBtn = document.getElementById('btnStop');
            if (status.realtime?.enabled) {
              agentStatus.textContent = status.realtime.connected ? 'Ativo' : 'Reconectando...';
              stopBtn.dataset.running = '1';
              stopBtn.textContent = 'Parar';
              stopBtn.style.background = 'var(--err)';
            } else {
              agentStatus.textContent = 'Parado';
              stopBtn.dataset.running = '0';
              stopBtn.textContent = 'Iniciar';
              stopBtn.style.background = 'var(--ok)';
            }
          }
        } catch (e) {
          console.error('Error loading status:', e);
          updateStatusBar(null);
        }
      }

      // ============ Browser Audio I/O ============
      let audioCtx = null;
      let nextStartAt = 0;
      let micStream = null;
      let micProcessor = null;
      let micSource = null;
      let audioWs = null;
      let outDest = null;
      let outAudioEl = null;
      let activeSources = [];
      let idleSent = true;
      let idleCheckTimer = null;
      let gainNode = null;
      let speakerVolume = 1.0;
      let micGainValue = 1.0;

      function ensureAudioCtx() {
        if (audioCtx && audioCtx.state !== 'closed') return audioCtx;
        audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
        nextStartAt = audioCtx.currentTime;
        // Create gain node for volume control
        gainNode = audioCtx.createGain();
        gainNode.gain.value = speakerVolume;
        outDest = audioCtx.createMediaStreamDestination();
        gainNode.connect(outDest);
        outAudioEl = new Audio();
        outAudioEl.autoplay = true;
        outAudioEl.srcObject = outDest.stream;
        outAudioEl.style.display = 'none';
        document.body.appendChild(outAudioEl);
        outAudioEl.play().catch(() => {});
        return audioCtx;
      }

      function setSpeakerVolume(vol) {
        speakerVolume = Math.max(0, Math.min(1, vol));
        if (gainNode) gainNode.gain.value = speakerVolume;
      }

      function setMicGain(gain) {
        micGainValue = Math.max(0.1, gain);
      }

      function maybeEmitIdle() {
        if (idleCheckTimer) return;
        if (activeSources.length !== 0 || idleSent) return;
        if (!audioWs || audioWs.readyState !== WebSocket.OPEN) return;
        idleCheckTimer = setTimeout(() => {
          idleCheckTimer = null;
          if (activeSources.length !== 0 || idleSent) return;
          idleSent = true;
          try { audioWs.send(JSON.stringify({ type: 'idle' })); } catch {}
        }, 600);
      }

      function playPcmChunk(int16) {
        const ctx = ensureAudioCtx();
        if (ctx.state === 'suspended') ctx.resume();
        const f32 = new Float32Array(int16.length);
        for (let i = 0; i < int16.length; i++) f32[i] = int16[i] / 32768;
        const buf = ctx.createBuffer(1, f32.length, 24000);
        buf.getChannelData(0).set(f32);
        const src = ctx.createBufferSource();
        src.buffer = buf;
        // Connect through gain node for volume control
        src.connect(gainNode);
        const startAt = Math.max(nextStartAt, ctx.currentTime);
        src.start(startAt);
        nextStartAt = startAt + buf.duration;
        activeSources.push(src);
        idleSent = false;
        if (idleCheckTimer) { clearTimeout(idleCheckTimer); idleCheckTimer = null; }
        src.onended = () => {
          const idx = activeSources.indexOf(src);
          if (idx !== -1) activeSources.splice(idx, 1);
          maybeEmitIdle();
        };
      }

      function resetPlayback() {
        for (const s of activeSources) {
          try { s.stop(); } catch {}
          try { s.disconnect(); } catch {}
        }
        activeSources = [];
        if (audioCtx) nextStartAt = audioCtx.currentTime;
      }

      async function startBrowserMic() {
        if (micStream) return;
        try {
          micStream = await navigator.mediaDevices.getUserMedia({
            audio: {
              channelCount: 1,
              sampleRate: 24000,
              echoCancellation: true,
              noiseSuppression: true,
              autoGainControl: false,
            },
          });
        } catch (e) {
          console.error('[mic] getUserMedia failed:', e);
          alert('Nao consegui acessar o mic. Permite acesso e recarrega.');
          return;
        }
        const ctx = ensureAudioCtx();
        micSource = ctx.createMediaStreamSource(micStream);
        micProcessor = ctx.createScriptProcessor(4096, 1, 1);
        micProcessor.onaudioprocess = (ev) => {
          if (!audioWs || audioWs.readyState !== WebSocket.OPEN) return;
          const input = ev.inputBuffer.getChannelData(0);
          const pcm16 = new Int16Array(input.length);
          for (let i = 0; i < input.length; i++) {
            const s = Math.max(-1, Math.min(1, input[i]));
            pcm16[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
          }
          audioWs.send(pcm16.buffer);
        };
        micSource.connect(micProcessor);
        micProcessor.connect(ctx.destination);
      }

      function stopBrowserMic() {
        if (micProcessor) { try { micProcessor.disconnect(); } catch {} micProcessor = null; }
        if (micSource) { try { micSource.disconnect(); } catch {} micSource = null; }
        if (micStream) {
          micStream.getTracks().forEach(t => t.stop());
          micStream = null;
        }
      }

      function connectAudioWs() {
        const url = (location.protocol === 'https:' ? 'wss:' : 'ws:') + '//' + location.host + '/ws/audio';
        try { audioWs = new WebSocket(url); } catch { setTimeout(connectAudioWs, 1000); return; }
        audioWs.binaryType = 'arraybuffer';
        audioWs.onopen = () => { startBrowserMic(); };
        audioWs.onmessage = (ev) => {
          if (typeof ev.data === 'string') {
            try {
              const m = JSON.parse(ev.data);
              if (m.type === 'end') {
                const ctx = ensureAudioCtx();
                if (nextStartAt < ctx.currentTime) nextStartAt = ctx.currentTime;
              } else if (m.type === 'reset') {
                resetPlayback();
              }
            } catch {}
            return;
          }
          playPcmChunk(new Int16Array(ev.data));
        };
        audioWs.onclose = () => { stopBrowserMic(); setTimeout(connectAudioWs, 1000); };
        audioWs.onerror = () => audioWs.close();
      }

      // Unlock audio on first interaction
      document.addEventListener('click', () => {
        ensureAudioCtx();
        if (audioCtx.state === 'suspended') audioCtx.resume();
      }, { once: true });

      // ============ Settings Panel ============
      function toggleSettings() {
        const panel = document.getElementById('settingsPanel');
        panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
      }

      async function loadSettings() {
        try {
          const settings = await api('/api/audio/settings');
          // Update sliders
          document.getElementById('sliderVolume').value = Math.round(settings.speakerVolume * 100);
          document.getElementById('volumeValue').textContent = Math.round(settings.speakerVolume * 100) + '%';
          document.getElementById('sliderMicGain').value = Math.round(settings.micGain * 10);
          document.getElementById('micGainValue').textContent = settings.micGain.toFixed(1) + 'x';
          document.getElementById('sliderCooldown').value = settings.micCooldownMs;
          document.getElementById('cooldownValue').textContent = (settings.micCooldownMs / 1000).toFixed(1) + 's';
          // Apply to local audio
          setSpeakerVolume(settings.speakerVolume);
          setMicGain(settings.micGain);
        } catch (e) {
          console.error('Error loading settings:', e);
        }
      }

      async function updateSetting(key, value) {
        try {
          const body = {};
          body[key] = value;
          await api('/api/audio/settings', { method: 'POST', body });
        } catch (e) {
          console.error('Error updating setting:', e);
        }
      }

      // Setup slider listeners
      document.getElementById('sliderVolume').addEventListener('input', function() {
        const vol = this.value / 100;
        document.getElementById('volumeValue').textContent = this.value + '%';
        setSpeakerVolume(vol);
        updateSetting('speakerVolume', vol);
      });

      document.getElementById('sliderMicGain').addEventListener('input', function() {
        const gain = this.value / 10;
        document.getElementById('micGainValue').textContent = gain.toFixed(1) + 'x';
        setMicGain(gain);
        updateSetting('micGain', gain);
      });

      document.getElementById('sliderCooldown').addEventListener('input', function() {
        const ms = parseInt(this.value);
        document.getElementById('cooldownValue').textContent = (ms / 1000).toFixed(1) + 's';
        updateSetting('micCooldownMs', ms);
      });

      // Initialize
      loadAgents();
      loadStatus();
      loadSettings();
      connectAudioWs();
      setInterval(loadStatus, 2000);
      setInterval(loadAgents, 30000);
    </script>
  </body>
</html>
