# Served via nginx:alpine which substitutes ${API_UPSTREAM} at container
# start (templates directory mechanism). The file is mounted as a template:
#   /etc/nginx/templates/default.conf.template
# Set env API_UPSTREAM=host:port (default: api:3000).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static assets with long cache
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API proxy. `${API_SCHEME}` is `http` for docker-compose (`api:3000`)
    # or `https` for Cloud Run (upstream is a run.app hostname).
    # `${API_UPSTREAM}` is just host[:port].
    location /api/ {
        proxy_pass ${API_SCHEME}://${API_UPSTREAM};
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host ${API_UPSTREAM};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # WebSocket proxy. Same upstream, with Upgrade headers.
    location /ws/ {
        proxy_pass ${API_SCHEME}://${API_UPSTREAM};
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host ${API_UPSTREAM};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
